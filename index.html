        <script type="module">
            /* ── Firebase ─────────────────────────────────────────────────── */
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
            import {
                getFirestore,
                collection,
                doc,
                onSnapshot,
                setDoc,
                deleteDoc,
                getDocs,
            } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

            const app = initializeApp({
                apiKey: "AIzaSyAySiMGc3vbfkPwlTuLFnMRdZsBSLvZ1p8",
                authDomain: "cooking-plan-12404.firebaseapp.com",
                projectId: "cooking-plan-12404",
                storageBucket: "cooking-plan-12404.firebasestorage.app",
                messagingSenderId: "646774578838",
                appId: "1:646774578838:web:26de1f261ba1c6c602acb7",
            });
            const db = getFirestore(app);
            const notesCol = collection(db, "notes");

            /* ── State ────────────────────────────────────────────────────── */
            let notes = {}; // id → note object
            let activeId = null;
            let activeFolder = "Alle";
            let searchQuery = "";
            let previewMode = false;
            let saveTimer = null;
            let ctxNoteId = null;
            let ctxFolderName = null;
            let resetClicks = 0;
            let resetTimer = null;
            // Tracks whether the last touch event was a long-press (to suppress click)
            let suppressClick = false;

            /* ── DOM helpers ──────────────────────────────────────────────── */
            const $ = (id) => document.getElementById(id);

            const sidebar = $("sidebar");
            const editorEl = $("editor");
            const edPlaceholder = $("ed-placeholder");
            const edHeader = $("ed-header");
            const edMeta = $("ed-meta");
            const edFooter = $("ed-footer");
            const noteTitle = $("note-title");
            const noteFolder = $("note-folder");
            const noteTags = $("note-tags");
            const noteBody = $("note-body");
            const mdPreview = $("md-preview");
            const noteList = $("note-list");
            const folderBar = $("folder-bar");
            const searchInput = $("search-input");
            const wcDisplay = $("wc-display");
            const toastEl = $("toast");
            const searchClearBtn = $("search-clear");
            const searchMeta = $("search-meta");
            const loadingScreen = $("loading-screen");
            const importInput = $("import-input");
            const ctxNoteEl = $("ctx-note");
            const ctxFolderEl = $("ctx-folder");
            const previewBtn = $("preview-btn");
            const previewIcon = $("preview-icon");
            const backBtn = $("back-btn");
            const themeIcon = $("theme-icon");
            const themeLabel = $("theme-label");
            const fsLeft = $("fs-left");
            const fsRight = $("fs-right");

            /* ── Theme ────────────────────────────────────────────────────── */
            const SUN_PATH = `
  <circle cx="12" cy="12" r="5"/>
  <line x1="12" y1="1"  x2="12" y2="3"/>
  <line x1="12" y1="21" x2="12" y2="23"/>
  <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
  <line x1="1"  y1="12" x2="3"  y2="12"/>
  <line x1="21" y1="12" x2="23" y2="12"/>
  <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
  <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>`;
            const MOON_PATH = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

            function setTheme(t) {
                document.documentElement.setAttribute("data-theme", t);
                localStorage.setItem("nexus-theme", t);
                if (t === "dark") {
                    themeIcon.innerHTML = MOON_PATH;
                    themeLabel.textContent = "Dunkel";
                } else {
                    themeIcon.innerHTML = SUN_PATH;
                    themeLabel.textContent = "Hell";
                }
            }
            // Apply saved or default theme immediately
            setTheme(localStorage.getItem("nexus-theme") || "light");

            $("theme-btn").addEventListener("click", () => {
                const current =
                    document.documentElement.getAttribute("data-theme");
                setTheme(current === "dark" ? "light" : "dark");
            });

            /* ── Toast ────────────────────────────────────────────────────── */
            let toastTimer = null;
            function showToast(msg) {
                clearTimeout(toastTimer);
                toastEl.textContent = msg;
                toastEl.classList.add("show");
                toastTimer = setTimeout(
                    () => toastEl.classList.remove("show"),
                    2800,
                );
            }

            /* ── Utilities ────────────────────────────────────────────────── */
            function uid() {
                return (
                    Date.now().toString(36) +
                    Math.random().toString(36).slice(2, 8)
                );
            }

            function escHtml(s) {
                return String(s ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            function fmtDate(ts) {
                if (!ts) return "";
                return new Date(ts).toLocaleDateString("de-DE", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "2-digit",
                });
            }

            /* ── Firestore real-time listener ─────────────────────────────── */
            /* ── Loading screen dismiss ───────────────────────────────────── */
            const ldStart = Date.now();
            const MIN_LD_MS = 1600;
            let ldDone = false;

            function dismissLoader() {
                if (ldDone || !loadingScreen) return;
                ldDone = true;
                const wait = Math.max(0, MIN_LD_MS - (Date.now() - ldStart));
                setTimeout(() => {
                    loadingScreen.classList.add("fade-out");
                    setTimeout(() => loadingScreen.remove(), 620);
                }, wait);
            }

            onSnapshot(notesCol, (snap) => {
                notes = {};
                snap.forEach((d) => {
                    notes[d.id] = { id: d.id, ...d.data() };
                });
                renderFolders();
                renderNotes();
                dismissLoader();
            });

            // Safety fallback – hide loader after 6 s even if Firebase is slow
            setTimeout(dismissLoader, 6000);

            /* ── Folders ──────────────────────────────────────────────────── */
            /* Smart folder IDs – never stored in Firebase */
            const SMART = { HEUTE: "::heute", ZULETZT: "::zuletzt" };

            function isToday(ts) {
                if (!ts) return false;
                const d = new Date(ts),
                    n = new Date();
                return (
                    d.getFullYear() === n.getFullYear() &&
                    d.getMonth() === n.getMonth() &&
                    d.getDate() === n.getDate()
                );
            }

            function getFolderList() {
                const set = new Set();
                Object.values(notes).forEach((n) => {
                    const f = (n.folder || "").trim();
                    if (f) set.add(f);
                });
                return [
                    "Alle",
                    SMART.HEUTE,
                    SMART.ZULETZT,
                    ...[...set].sort((a, b) => a.localeCompare(b)),
                ];
            }

            function renderFolders() {
                const folders = getFolderList();
                folderBar.innerHTML = "";

                const LABELS = {
                    [SMART.HEUTE]: "Heute",
                    [SMART.ZULETZT]: "Zuletzt",
                };

                folders.forEach((f) => {
                    const isSmart = f === SMART.HEUTE || f === SMART.ZULETZT;
                    const chip = document.createElement("div");
                    chip.className =
                        "folder-chip" +
                        (isSmart ? " smart" : "") +
                        (f === activeFolder ? " active" : "");
                    chip.textContent = LABELS[f] ?? f;
                    chip.dataset.folder = f;
                    chip.setAttribute("role", "tab");
                    chip.setAttribute(
                        "aria-selected",
                        String(f === activeFolder),
                    );

                    chip.addEventListener("click", () => {
                        if (suppressClick || dragState.didDrag) return;
                        activeFolder = f;
                        renderFolders();
                        renderNotes();
                    });

                    if (!isSmart) {
                        chip.addEventListener("contextmenu", (e) => {
                            e.preventDefault();
                            showFolderMenu(e, f);
                        });
                        let lpTimer = null;
                        chip.addEventListener(
                            "touchstart",
                            (e) => {
                                suppressClick = false;
                                lpTimer = setTimeout(() => {
                                    suppressClick = true;
                                    showFolderMenu(e.touches[0], f);
                                }, 500);
                            },
                            { passive: true },
                        );
                        chip.addEventListener("touchend", () =>
                            clearTimeout(lpTimer),
                        );
                        chip.addEventListener("touchmove", () =>
                            clearTimeout(lpTimer),
                        );
                    }

                    folderBar.appendChild(chip);
                });

                updateFolderArrows();
            }

            /* ── Notes ────────────────────────────────────────────────────── */
            function getFilteredNotes() {
                let list = Object.values(notes);

                if (activeFolder === SMART.HEUTE) {
                    list = list.filter((n) =>
                        isToday(n.createdAt || n.updatedAt),
                    );
                } else if (activeFolder === SMART.ZULETZT) {
                    list = list
                        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0))
                        .slice(0, 12);
                } else if (activeFolder !== "Alle") {
                    list = list.filter(
                        (n) => (n.folder || "").trim() === activeFolder,
                    );
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    list = list.filter((n) => {
                        try {
                            if ((n.title || "").toLowerCase().includes(q))
                                return true;
                            if (
                                (n.body || n.content || "")
                                    .toLowerCase()
                                    .includes(q)
                            )
                                return true;
                            if ((n.tags || "").toLowerCase().includes(q))
                                return true;
                            if ((n.folder || "").toLowerCase().includes(q))
                                return true;
                            const ts = n.updatedAt || n.createdAt;
                            if (ts) {
                                const d = new Date(ts);
                                const ds =
                                    String(d.getDate()).padStart(2, "0") +
                                    "." +
                                    String(d.getMonth() + 1).padStart(2, "0") +
                                    "." +
                                    d.getFullYear() +
                                    " " +
                                    d.getFullYear();
                                if (ds.includes(q)) return true;
                            }
                        } catch (_) {
                            /* never block a note due to a formatting error */
                        }
                        return false;
                    });
                }

                return list.sort(
                    (a, b) => (b.updatedAt || 0) - (a.updatedAt || 0),
                );
            }

            /* ── Search highlight helper ──────────────────────────────────── */
            function highlight(text, term) {
                if (!term || !text) return escHtml(text || "");
                const safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                return escHtml(text).replace(
                    new RegExp(`(${safe})`, "gi"),
                    "<mark>$1</mark>",
                );
            }

            function renderNotes() {
                const list = getFilteredNotes();
                noteList.innerHTML = "";

                if (!list.length) {
                    noteList.innerHTML = `
      <div class="notes-empty">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <p>Keine Notizen gefunden.</p>
      </div>`;
                    return;
                }

                list.forEach((n) => {
                    const el = document.createElement("div");
                    el.className =
                        "note-item" + (n.id === activeId ? " active" : "");
                    el.dataset.id = n.id;

                    const preview = (n.body || "")
                        .replace(/\s+/g, " ")
                        .trim()
                        .slice(0, 68);
                    const folder = (n.folder || "").trim();

                    el.innerHTML = `
      <div class="ni-title">${highlight(n.title || "Ohne Titel", searchQuery)}</div>
      <div class="ni-preview">${
          preview
              ? highlight(preview, searchQuery)
              : '<span style="opacity:.4">Kein Inhalt</span>'
      }</div>
      <div class="ni-meta">
        <span class="ni-date">${fmtDate(n.updatedAt)}</span>
        ${folder ? `<span class="ni-folder">${highlight(folder, searchQuery)}</span>` : ""}
      </div>`;

                    // Open on click
                    el.addEventListener("click", () => {
                        if (suppressClick) return;
                        openNote(n.id);
                    });

                    // Right-click context menu
                    el.addEventListener("contextmenu", (e) => {
                        e.preventDefault();
                        showNoteMenu(e, n.id);
                    });

                    // 500 ms long-press (touch)
                    let lpTimer = null;
                    el.addEventListener(
                        "touchstart",
                        (e) => {
                            suppressClick = false;
                            lpTimer = setTimeout(() => {
                                suppressClick = true;
                                showNoteMenu(e.touches[0], n.id);
                            }, 500);
                        },
                        { passive: true },
                    );
                    el.addEventListener("touchend", () =>
                        clearTimeout(lpTimer),
                    );
                    el.addEventListener("touchmove", () =>
                        clearTimeout(lpTimer),
                    );

                    noteList.appendChild(el);
                });
            }

            /* ── Open / close note ────────────────────────────────────────── */
            function openNote(id) {
                activeId = id;
                const n = notes[id];
                if (!n) return;

                // Populate fields
                noteTitle.value = n.title || "";
                noteFolder.value = n.folder || "";
                noteTags.value = n.tags || "";
                noteBody.value = n.body || "";

                // Reset to edit mode
                previewMode = false;
                noteBody.style.display = "block";
                mdPreview.style.display = "none";
                previewBtn.classList.remove("on");
                setPreviewIcon(false);

                // Show all editor panels
                edPlaceholder.style.display = "none";
                edHeader.style.display = "flex";
                edMeta.style.display = "flex";
                edFooter.style.display = "block";

                updateCounter();
                renderNotes();

                // Mobile: slide editor in
                editorEl.classList.add("open");

                // Focus title when brand-new
                if (!noteTitle.value) noteTitle.focus();
            }

            function closeEditor() {
                activeId = null;
                editorEl.classList.remove("open");
                edPlaceholder.style.display = "flex";
                edHeader.style.display = "none";
                edMeta.style.display = "none";
                noteBody.style.display = "none";
                edFooter.style.display = "none";
                mdPreview.style.display = "none";
                renderNotes();
            }

            backBtn.addEventListener("click", () => {
                editorEl.classList.remove("open");
                activeId = null;
                renderNotes();
            });

            /* ── New note (FAB) ───────────────────────────────────────────── */
            $("fab").addEventListener("click", async () => {
                const id = uid();
                const now = Date.now();
                await setDoc(doc(db, "notes", id), {
                    title: "",
                    body: "",
                    folder: activeFolder !== "Alle" ? activeFolder : "",
                    tags: "",
                    createdAt: now,
                    updatedAt: now,
                });
                openNote(id);
            });

            /* ── Debounced save ───────────────────────────────────────────── */
            function scheduleSave() {
                clearTimeout(saveTimer);
                saveTimer = setTimeout(saveNote, 400);
            }

            async function saveNote() {
                if (!activeId) return;
                await setDoc(
                    doc(db, "notes", activeId),
                    {
                        title: noteTitle.value,
                        body: noteBody.value,
                        folder: noteFolder.value.trim(),
                        tags: noteTags.value.trim(),
                        updatedAt: Date.now(),
                    },
                    { merge: true },
                );
            }

            noteTitle.addEventListener("input", scheduleSave);
            noteFolder.addEventListener("input", scheduleSave);
            noteTags.addEventListener("input", scheduleSave);
            noteBody.addEventListener("input", () => {
                scheduleSave();
                updateCounter();
                detectSlash();
            });

            /* ── Delete note ──────────────────────────────────────────────── */
            $("delete-btn").addEventListener("click", () =>
                deleteNote(activeId),
            );

            async function deleteNote(id) {
                if (!id || !notes[id]) return;
                await deleteDoc(doc(db, "notes", id));
                if (id === activeId) closeEditor();
                showToast("Notiz gelöscht");
            }

            /* ── Word / character counter ─────────────────────────────────── */
            function updateCounter() {
                const raw = noteBody.value;
                const chars = raw.length;
                const words = raw.trim() ? raw.trim().split(/\s+/).length : 0;
                wcDisplay.textContent = `${words} ${words === 1 ? "Wort" : "Wörter"} · ${chars} Zeichen`;
            }

            /* ── Formatting toolbar ───────────────────────────────────────── */
            let editorFontSize = 14;

            function wrapSel(before, after) {
                const ta = noteBody;
                const s = ta.selectionStart;
                const e = ta.selectionEnd;
                const v = ta.value;
                const sel = v.slice(s, e) || "Text";
                ta.value = v.slice(0, s) + before + sel + after + v.slice(e);
                ta.selectionStart = s + before.length;
                ta.selectionEnd = s + before.length + sel.length;
                ta.focus();
                scheduleSave();
                updateCounter();
                if (previewMode) mdPreview.innerHTML = parseMarkdown(ta.value);
            }

            function prependLine(prefix) {
                const ta = noteBody;
                const cur = ta.selectionStart;
                const v = ta.value;
                const ls = v.lastIndexOf("\n", cur - 1) + 1;
                const le = v.indexOf("\n", cur);
                const line = v.slice(ls, le === -1 ? undefined : le);
                const rest = le === -1 ? "" : v.slice(le);
                if (line.startsWith(prefix)) {
                    ta.value =
                        v.slice(0, ls) + line.slice(prefix.length) + rest;
                    ta.selectionStart = ta.selectionEnd = Math.max(
                        ls,
                        cur - prefix.length,
                    );
                } else {
                    ta.value = v.slice(0, ls) + prefix + line + rest;
                    ta.selectionStart = ta.selectionEnd = cur + prefix.length;
                }
                ta.focus();
                scheduleSave();
                updateCounter();
                if (previewMode) mdPreview.innerHTML = parseMarkdown(ta.value);
            }

            function applyFmt(type) {
                switch (type) {
                    case "bold":
                        wrapSel("**", "**");
                        break;
                    case "italic":
                        wrapSel("*", "*");
                        break;
                    case "strike":
                        wrapSel("~~", "~~");
                        break;
                    case "code": {
                        const sel = noteBody.value.slice(
                            noteBody.selectionStart,
                            noteBody.selectionEnd,
                        );
                        sel.includes("\n")
                            ? wrapSel("```\n", "\n```")
                            : wrapSel("`", "`");
                        break;
                    }
                    case "h1":
                        prependLine("# ");
                        break;
                    case "h2":
                        prependLine("## ");
                        break;
                    case "h3":
                        prependLine("### ");
                        break;
                    case "ul":
                        prependLine("- ");
                        break;
                    case "check":
                        prependLine("- [ ] ");
                        break;
                    case "smaller":
                        editorFontSize = Math.max(10, editorFontSize - 1);
                        noteBody.style.fontSize = editorFontSize + "px";
                        mdPreview.style.fontSize = editorFontSize + "px";
                        document.getElementById("fs-val").textContent =
                            editorFontSize;
                        break;
                    case "larger":
                        editorFontSize = Math.min(24, editorFontSize + 1);
                        noteBody.style.fontSize = editorFontSize + "px";
                        mdPreview.style.fontSize = editorFontSize + "px";
                        document.getElementById("fs-val").textContent =
                            editorFontSize;
                        break;
                    case "link": {
                        const pos = noteBody.selectionStart;
                        const v = noteBody.value;
                        noteBody.value = v.slice(0, pos) + "//" + v.slice(pos);
                        noteBody.selectionStart = noteBody.selectionEnd =
                            pos + 2;
                        noteBody.focus();
                        noteBody.dispatchEvent(new Event("input"));
                        break;
                    }
                }
            }

            document.querySelectorAll(".fmt-btn[data-fmt]").forEach((btn) => {
                btn.addEventListener("click", () => applyFmt(btn.dataset.fmt));
            });

            /* ── // Link Picker ───────────────────────────────────────────── */
            let pkSlashStart = -1;
            let pkActiveIdx = -1;
            let pkItems = [];
            const linkPicker = $("link-picker");
            const pkBody = $("pk-body");

            function detectSlash() {
                const val = noteBody.value;
                const cur = noteBody.selectionStart;
                const before = val.slice(0, cur);
                const lastSl = before.lastIndexOf("//");
                if (lastSl === -1) {
                    hidePicker();
                    return;
                }
                const afterSl = before.slice(lastSl + 2);
                if (afterSl.includes("\n")) {
                    hidePicker();
                    return;
                }
                const prev = lastSl > 0 ? before[lastSl - 1] : "\n";
                if (prev !== "\n" && prev !== " " && prev !== "\t") {
                    hidePicker();
                    return;
                }
                pkSlashStart = lastSl;
                renderPicker(afterSl.toLowerCase());
            }

            function renderPicker(term) {
                const matchNotes = Object.values(notes)
                    .filter(
                        (n) =>
                            !term ||
                            (n.title || "").toLowerCase().includes(term),
                    )
                    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0))
                    .slice(0, 6);

                const allFolders = [
                    ...new Set(
                        Object.values(notes).map(
                            (n) => n.folder || "Allgemein",
                        ),
                    ),
                ].sort();
                const matchFolders = allFolders
                    .filter((f) => !term || f.toLowerCase().includes(term))
                    .slice(0, 4);

                const isUrl = /^https?:\/\/|^www\./i.test(term);

                pkItems = [];
                let html = "";

                if (matchNotes.length) {
                    html += '<div class="pk-section">Notizen</div>';
                    matchNotes.forEach((n) => {
                        const idx = pkItems.length;
                        pkItems.push({
                            type: "note",
                            id: n.id,
                            label: n.title || "Unbenannt",
                        });
                        html += `<div class="pk-item" data-pk="${idx}">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            ${escHtml(n.title || "Unbenannt")}
                        </div>`;
                    });
                }

                if (matchFolders.length) {
                    if (html) html += '<div class="pk-sep"></div>';
                    html += '<div class="pk-section">Ordner</div>';
                    matchFolders.forEach((f) => {
                        const idx = pkItems.length;
                        pkItems.push({ type: "folder", label: f });
                        html += `<div class="pk-item" data-pk="${idx}">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            </svg>
                            ${escHtml(f)}
                        </div>`;
                    });
                }

                if (isUrl) {
                    if (html) html += '<div class="pk-sep"></div>';
                    const idx = pkItems.length;
                    pkItems.push({ type: "url", label: term, url: term });
                    html += `<div class="pk-item" data-pk="${idx}">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                        ${escHtml(term)}
                    </div>`;
                }

                if (!pkItems.length) {
                    html =
                        '<div class="pk-empty">Kein Ergebnis — gib einen Titel ein</div>';
                }

                pkBody.innerHTML = html;
                pkActiveIdx = pkItems.length > 0 ? 0 : -1;
                if (pkActiveIdx >= 0) setPkActive(0);

                pkBody.querySelectorAll(".pk-item").forEach((el) => {
                    el.addEventListener("click", () =>
                        selectPickerItem(parseInt(el.dataset.pk)),
                    );
                });

                // Position just above the footer
                const rect = edFooter.getBoundingClientRect();
                linkPicker.style.left = Math.max(8, rect.left + 12) + "px";
                linkPicker.style.bottom =
                    window.innerHeight - rect.top + 4 + "px";
                linkPicker.style.top = "auto";
                linkPicker.classList.add("open");
            }

            function setPkActive(idx) {
                pkBody
                    .querySelectorAll(".pk-item")
                    .forEach((el, i) =>
                        el.classList.toggle("pk-on", i === idx),
                    );
                pkActiveIdx = idx;
            }

            function selectPickerItem(idx) {
                const item = pkItems[idx];
                if (!item) return hidePicker();
                const val = noteBody.value;
                const cur = noteBody.selectionStart;
                let insert = "";
                if (item.type === "note") insert = `[[${item.label}]]`;
                if (item.type === "folder") insert = `[[>>${item.label}]]`;
                if (item.type === "url") insert = `[${item.url}](${item.url})`;
                noteBody.value =
                    val.slice(0, pkSlashStart) + insert + val.slice(cur);
                noteBody.selectionStart = noteBody.selectionEnd =
                    pkSlashStart + insert.length;
                noteBody.focus();
                hidePicker();
                scheduleSave();
                updateCounter();
                if (previewMode)
                    mdPreview.innerHTML = parseMarkdown(noteBody.value);
            }

            function hidePicker() {
                linkPicker.classList.remove("open");
                pkSlashStart = -1;
                pkItems = [];
                pkActiveIdx = -1;
            }

            noteBody.addEventListener("keydown", (e) => {
                // Formatting shortcuts
                if ((e.ctrlKey || e.metaKey) && e.key === "b") {
                    e.preventDefault();
                    applyFmt("bold");
                    return;
                }
                if ((e.ctrlKey || e.metaKey) && e.key === "i") {
                    e.preventDefault();
                    applyFmt("italic");
                    return;
                }
                // Picker navigation
                if (!linkPicker.classList.contains("open")) return;
                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    setPkActive(Math.min(pkActiveIdx + 1, pkItems.length - 1));
                } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    setPkActive(Math.max(pkActiveIdx - 1, 0));
                } else if (e.key === "Enter" && pkActiveIdx >= 0) {
                    e.preventDefault();
                    selectPickerItem(pkActiveIdx);
                } else if (e.key === "Escape") {
                    hidePicker();
                }
            });

            document.addEventListener("click", (e) => {
                if (!linkPicker.contains(e.target) && e.target !== noteBody)
                    hidePicker();
            });

            /* ── Markdown preview ─────────────────────────────────────────── */
            function setPreviewIcon(on) {
                previewIcon.innerHTML = on
                    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
         a18.45 18.45 0 0 1 5.06-5.94"/>
       <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
         a18.5 18.5 0 0 1-2.16 3.19"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
                    : `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
       <circle cx="12" cy="12" r="3"/>`;
            }

            previewBtn.addEventListener("click", () => {
                previewMode = !previewMode;
                if (previewMode) {
                    mdPreview.innerHTML = parseMarkdown(noteBody.value);
                    mdPreview.style.display = "block";
                    noteBody.style.display = "none";
                    previewBtn.classList.add("on");
                } else {
                    mdPreview.style.display = "none";
                    noteBody.style.display = "block";
                    previewBtn.classList.remove("on");
                }
                setPreviewIcon(previewMode);
            });

            /* ── Markdown parser ──────────────────────────────────────────── */
            function applyInline(text) {
                let s = escHtml(text);
                // [[>>Folder]] → folder link chip  (>> is &gt;&gt; after escHtml)
                s = s.replace(/\[\[&gt;&gt;([^\]]+)\]\]/g, (_, raw) => {
                    const name = raw
                        .replace(/&amp;/g, "&")
                        .replace(/&lt;/g, "<")
                        .replace(/&gt;/g, ">");
                    const safe = name.replace(/'/g, "&#39;");
                    return `<span class="md-folder-link" onclick="filterByFolder('${safe}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> ${escHtml(name)}</span>`;
                });
                // [[Note Title]] → note link chip
                s = s.replace(/\[\[([^\]]+)\]\]/g, (_, raw) => {
                    const title = raw
                        .replace(/&amp;/g, "&")
                        .replace(/&lt;/g, "<")
                        .replace(/&gt;/g, ">");
                    const note = Object.values(notes).find(
                        (n) => n.title === title,
                    );
                    return note
                        ? `<span class="md-note-link" onclick="openNoteById('${note.id}')">${escHtml(title)}</span>`
                        : `<span class="md-note-link md-unresolved">${escHtml(title)}</span>`;
                });
                // Markdown links [text](url)
                s = s.replace(
                    /\[([^\]]+)\]\(([^)]+)\)/g,
                    '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>',
                );
                // Inline code (protects content from further passes)
                s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
                // Bold + italic combined
                s = s.replace(
                    /\*\*\*([^*]+)\*\*\*/g,
                    "<strong><em>$1</em></strong>",
                );
                // Bold
                s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
                // Italic
                s = s.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, "<em>$1</em>");
                // Strikethrough
                s = s.replace(/~~([^~]+)~~/g, "<del>$1</del>");
                return s;
            }

            function parseMarkdown(raw) {
                const lines = raw.split("\n");
                let html = "";
                let inList = false;

                const closeList = () => {
                    if (inList) {
                        html += "</ul>";
                        inList = false;
                    }
                };

                for (const line of lines) {
                    // Headings
                    if (line.startsWith("### ")) {
                        closeList();
                        html += `<h3>${applyInline(line.slice(4))}</h3>`;
                    } else if (line.startsWith("## ")) {
                        closeList();
                        html += `<h2>${applyInline(line.slice(3))}</h2>`;
                    } else if (line.startsWith("# ")) {
                        closeList();
                        html += `<h1>${applyInline(line.slice(2))}</h1>`;
                    }
                    // Horizontal rule
                    else if (/^-{3,}$/.test(line.trim())) {
                        closeList();
                        html += "<hr>";
                    }
                    // Checked checklist  - [x]
                    else if (/^- \[x\] /i.test(line)) {
                        if (!inList) {
                            html += "<ul>";
                            inList = true;
                        }
                        html +=
                            `<li><div class="md-check">` +
                            `<div class="md-box checked"></div>` +
                            `<span class="md-lbl done">${applyInline(line.slice(6))}</span>` +
                            `</div></li>`;
                    }
                    // Unchecked checklist  - [ ]
                    else if (/^- \[ \] /.test(line)) {
                        if (!inList) {
                            html += "<ul>";
                            inList = true;
                        }
                        html +=
                            `<li><div class="md-check">` +
                            `<div class="md-box"></div>` +
                            `<span class="md-lbl">${applyInline(line.slice(6))}</span>` +
                            `</div></li>`;
                    }
                    // List item  -
                    else if (/^- /.test(line)) {
                        if (!inList) {
                            html += "<ul>";
                            inList = true;
                        }
                        html += `<li>${applyInline(line.slice(2))}</li>`;
                    }
                    // Empty line → spacer
                    else if (line.trim() === "") {
                        closeList();
                        html += "<br>";
                    }
                    // Paragraph
                    else {
                        closeList();
                        html += `<p>${applyInline(line)}</p>`;
                    }
                }
                closeList();
                return html;
            }

            /* ── Context menus ────────────────────────────────────────────── */
            function positionMenu(menuEl, clientX, clientY) {
                // Place off-screen first to get computed size
                menuEl.style.left = "-9999px";
                menuEl.style.top = "-9999px";
                menuEl.classList.add("visible");

                const mw = menuEl.offsetWidth;
                const mh = menuEl.offsetHeight;
                const vw = window.innerWidth;
                const vh = window.innerHeight;

                menuEl.style.left =
                    Math.max(8, Math.min(clientX, vw - mw - 8)) + "px";
                menuEl.style.top =
                    Math.max(8, Math.min(clientY, vh - mh - 8)) + "px";
            }

            function showNoteMenu(e, id) {
                hideAllMenus();
                ctxNoteId = id;
                positionMenu(
                    ctxNoteEl,
                    e.clientX ?? e.pageX ?? 0,
                    e.clientY ?? e.pageY ?? 0,
                );
            }

            function showFolderMenu(e, folder) {
                hideAllMenus();
                ctxFolderName = folder;
                const isAll = folder === "Alle";
                $("ctx-folder-sep").style.display = isAll ? "none" : "block";
                $("ctx-folder-delete").style.display = isAll ? "none" : "flex";
                positionMenu(
                    ctxFolderEl,
                    e.clientX ?? e.pageX ?? 0,
                    e.clientY ?? e.pageY ?? 0,
                );
            }

            function hideAllMenus() {
                ctxNoteEl.classList.remove("visible");
                ctxFolderEl.classList.remove("visible");
            }

            // Dismiss menus on outside click / Escape
            document.addEventListener("click", (e) => {
                if (!ctxNoteEl.contains(e.target))
                    ctxNoteEl.classList.remove("visible");
                if (!ctxFolderEl.contains(e.target))
                    ctxFolderEl.classList.remove("visible");
            });
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") hideAllMenus();
            });

            // Note menu actions
            $("ctx-note-open").addEventListener("click", () => {
                if (ctxNoteId) openNote(ctxNoteId);
                hideAllMenus();
            });
            $("ctx-note-delete").addEventListener("click", () => {
                if (ctxNoteId) deleteNote(ctxNoteId);
                hideAllMenus();
            });

            // Folder menu actions
            $("ctx-folder-select").addEventListener("click", () => {
                if (ctxFolderName) {
                    activeFolder = ctxFolderName;
                    renderFolders();
                    renderNotes();
                }
                hideAllMenus();
            });
            $("ctx-folder-delete").addEventListener("click", async () => {
                if (!ctxFolderName || ctxFolderName === "Alle") {
                    hideAllMenus();
                    return;
                }
                const folderName = ctxFolderName;
                hideAllMenus();
                // Move notes from deleted folder to root ("Alle")
                const affected = Object.values(notes).filter(
                    (n) => (n.folder || "").trim() === folderName,
                );
                for (const n of affected) {
                    await setDoc(
                        doc(db, "notes", n.id),
                        { folder: "" },
                        { merge: true },
                    );
                }
                if (activeFolder === folderName) activeFolder = "Alle";
                showToast(`Ordner "${folderName}" gelöscht`);
            });

            /* ── Folder scroll arrows ─────────────────────────────────────── */
            function updateFolderArrows() {
                const sl = folderBar.scrollLeft;
                const maxSl = folderBar.scrollWidth - folderBar.clientWidth;
                fsLeft.classList.toggle("visible", sl > 2);
                fsRight.classList.toggle("visible", maxSl - sl > 2);
            }

            folderBar.addEventListener("scroll", updateFolderArrows);
            window.addEventListener("resize", updateFolderArrows);

            fsLeft.addEventListener("click", () =>
                folderBar.scrollBy({ left: -130, behavior: "smooth" }),
            );
            fsRight.addEventListener("click", () =>
                folderBar.scrollBy({ left: 130, behavior: "smooth" }),
            );

            // Keyboard arrow navigation when folder bar is focused
            folderBar.addEventListener("keydown", (e) => {
                if (e.key === "ArrowRight") {
                    e.preventDefault();
                    folderBar.scrollBy({ left: 90, behavior: "smooth" });
                }
                if (e.key === "ArrowLeft") {
                    e.preventDefault();
                    folderBar.scrollBy({ left: -90, behavior: "smooth" });
                }
            });

            // Mouse-drag to scroll (desktop)
            const dragState = {
                active: false,
                startX: 0,
                scrollX: 0,
                didDrag: false,
            };

            folderBar.addEventListener("mousedown", (e) => {
                dragState.active = true;
                dragState.startX = e.pageX;
                dragState.scrollX = folderBar.scrollLeft;
                dragState.didDrag = false;
                folderBar.classList.add("is-dragging");
            });
            document.addEventListener("mousemove", (e) => {
                if (!dragState.active) return;
                const dx = e.pageX - dragState.startX;
                if (Math.abs(dx) > 4) dragState.didDrag = true;
                folderBar.scrollLeft = dragState.scrollX - dx;
            });
            document.addEventListener("mouseup", () => {
                if (!dragState.active) return;
                dragState.active = false;
                folderBar.classList.remove("is-dragging");
                // Reset didDrag after click event has fired
                setTimeout(() => {
                    dragState.didDrag = false;
                }, 60);
            });

            /* ── Search ───────────────────────────────────────────────────── */
            function updateSearchMeta() {
                if (!searchQuery) {
                    searchMeta.innerHTML = "";
                    return;
                }
                const count = getFilteredNotes().length;
                const folderHint =
                    activeFolder !== "Alle" &&
                    activeFolder !== SMART.HEUTE &&
                    activeFolder !== SMART.ZULETZT
                        ? ` <span class="search-meta-filter">in „${escHtml(activeFolder)}"</span>`
                        : "";
                searchMeta.innerHTML =
                    `<span class="search-meta-count">${count}</span> ` +
                    `${count === 1 ? "Ergebnis" : "Ergebnisse"}${folderHint}`;
            }

            let searchDebounce = null;
            searchInput.addEventListener("input", (e) => {
                searchQuery = e.target.value.trim();
                const hasVal = searchQuery.length > 0;
                searchClearBtn.classList.toggle("show", hasVal);
                searchInput.classList.toggle("has-value", hasVal);
                clearTimeout(searchDebounce);
                searchDebounce = setTimeout(() => {
                    renderNotes();
                    updateSearchMeta();
                }, 120);
            });

            searchClearBtn.addEventListener("click", () => {
                searchInput.value = "";
                searchQuery = "";
                searchClearBtn.classList.remove("show");
                searchInput.classList.remove("has-value");
                searchMeta.innerHTML = "";
                searchInput.focus();
                renderNotes();
            });

            /* ── Export ───────────────────────────────────────────────────── */
            $("export-btn").addEventListener("click", () => {
                const json = JSON.stringify(Object.values(notes), null, 2);
                const blob = new Blob([json], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `nexus-notes-${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast("Export abgeschlossen");
            });

            /* ── Import ───────────────────────────────────────────────────── */
            $("import-btn").addEventListener("click", () =>
                importInput.click(),
            );

            importInput.addEventListener("change", async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if (!Array.isArray(data)) throw new Error("Kein Array");
                    let count = 0;
                    for (const n of data) {
                        if (!n.id) n.id = uid();
                        await setDoc(
                            doc(db, "notes", String(n.id)),
                            { ...n },
                            { merge: true },
                        );
                        count++;
                    }
                    showToast(`Import: ${count} Notizen`);
                } catch {
                    showToast("Import fehlgeschlagen");
                }
                importInput.value = "";
            });

            /* ── Reset: clears ONLY local device data (Firebase stays intact) */
            $("reset-btn").addEventListener("click", async () => {
                resetClicks++;
                clearTimeout(resetTimer);

                if (resetClicks === 1) {
                    showToast(
                        "Nochmals klicken – löscht nur lokale Gerätedaten",
                    );
                    resetTimer = setTimeout(() => {
                        resetClicks = 0;
                    }, 3500);
                } else if (resetClicks >= 2) {
                    resetClicks = 0;
                    // Clear localStorage (theme, prefs)
                    localStorage.clear();
                    // Clear all SW caches
                    if ("caches" in window) {
                        const keys = await caches.keys();
                        await Promise.all(keys.map((k) => caches.delete(k)));
                    }
                    // Unregister service workers so they re-install fresh
                    if ("serviceWorker" in navigator) {
                        const regs =
                            await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map((r) => r.unregister()));
                    }
                    showToast(
                        "Lokale Daten gelöscht — Firebase-Daten bleiben erhalten",
                    );
                    setTimeout(() => location.reload(), 1400);
                }
            });

            /* ── Focus mode ───────────────────────────────────────────────── */
            const focusBtn = $("focus-btn");
            const focusExit = $("focus-exit");

            focusBtn.addEventListener("click", () => {
                document.body.classList.add("focus-mode");
                noteBody.focus();
            });
            focusExit.addEventListener("click", () =>
                document.body.classList.remove("focus-mode"),
            );
            document.addEventListener("keydown", (e) => {
                if (
                    e.key === "Escape" &&
                    document.body.classList.contains("focus-mode")
                ) {
                    document.body.classList.remove("focus-mode");
                }
            });

            /* ── Offline banner ────────────────────────────────────────────── */
            const offlineBar = $("offline-bar");
            window.addEventListener("offline", () =>
                offlineBar.classList.add("show"),
            );
            window.addEventListener("online", () =>
                offlineBar.classList.remove("show"),
            );
            if (!navigator.onLine) offlineBar.classList.add("show");

            /* ── Bootstrap ────────────────────────────────────────────────── */
            /* ── Window globals for md-preview onclick handlers ───────────── */
            window.openNoteById = (id) => {
                if (notes[id]) openNote(id);
            };
            window.filterByFolder = (name) => {
                activeFolder = name;
                renderFolders();
                renderNotes();
            };

            // Give DOM a tick to render folder chips before checking arrow visibility
            setTimeout(updateFolderArrows, 200);

            /* ── Service Worker registration ──────────────────────────────── */
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker.register("./sw.js").catch((err) => {
                        console.warn("SW registration failed:", err);
                    });
                });
            }
        </script>
    </body>
</html>
